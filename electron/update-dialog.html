<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CAS Express</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #051208 0%, #0a2e14 55%, #051208 100%);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 32px 24px;
      user-select: none;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Barra arrastrable arriba */
    .drag-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 36px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(105,240,174,0.08);
    }
    .drag-bar .app-name {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .drag-bar .close-btn {
      -webkit-app-region: no-drag;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .drag-bar .close-btn:hover {
      background: rgba(239,83,80,0.7);
      color: #fff;
    }

    /* Ícono central */
    .icon-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
      position: relative;
    }
    .icon-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      animation: ring 2.5s linear infinite;
    }
    @keyframes ring {
      0%   { transform: rotate(0deg);   border-color: rgba(105,240,174,0.5) transparent transparent transparent; }
      100% { transform: rotate(360deg); border-color: rgba(105,240,174,0.5) transparent transparent transparent; }
    }
    .icon-wrap.no-ring::before { display: none; }

    .icon-wrap svg { width: 32px; height: 32px; }

    /* Badge versión */
    .version-badge {
      display: none;
      background: rgba(105,240,174,0.12);
      border: 1px solid rgba(105,240,174,0.3);
      color: #69f0ae;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
      letter-spacing: 0.8px;
    }

    h1 {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .divider {
      width: 36px; height: 2px;
      background: rgba(105,240,174,0.35);
      border-radius: 1px;
      margin: 10px 0 14px;
    }

    p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      line-height: 1.65;
      margin-bottom: 26px;
      max-width: 280px;
    }
    p strong { color: #69f0ae; font-weight: 600; }

    /* Barra de progreso */
    .progress-wrap {
      display: none;
      width: 100%;
      max-width: 280px;
      margin-bottom: 26px;
    }
    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #1b5e20, #69f0ae);
      animation: slide 1.6s ease-in-out infinite;
      width: 45%;
    }
    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
    .progress-label {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* Botones */
    .buttons {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 290px;
    }
    button {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.2px;
    }
    button.primary {
      background: linear-gradient(135deg, #2e7d32, #43a047);
      color: #fff;
      box-shadow: 0 4px 18px rgba(46,125,50,0.45);
    }
    button.primary:hover {
      background: linear-gradient(135deg, #388e3c, #4caf50);
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(46,125,50,0.55);
    }
    button.primary:active { transform: translateY(0); }

    button.secondary {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }
    button.secondary:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="drag-bar">
    <span class="app-name">CAS Express Majahual</span>
    <button class="close-btn" onclick="closeDialog()">✕</button>
  </div>

  <div class="icon-wrap" id="iconWrap">
    <svg id="iconSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round"></svg>
  </div>

  <div class="version-badge" id="versionBadge"></div>
  <h1 id="heading"></h1>
  <div class="divider"></div>
  <p id="body"></p>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="progress-label">Descargando actualización…</div>
  </div>

  <div class="buttons" id="buttons"></div>

  <script>
    const { ipcRenderer } = require('electron');

    const params  = new URLSearchParams(window.location.search);
    const type    = params.get('type')    || 'available';
    const version = params.get('version') || '';
    const message = params.get('message') || '';

    const iconWrap    = document.getElementById('iconWrap');
    const iconSvg     = document.getElementById('iconSvg');
    const versionBadge = document.getElementById('versionBadge');
    const heading     = document.getElementById('heading');
    const bodyEl      = document.getElementById('body');
    const progressWrap = document.getElementById('progressWrap');
    const buttons     = document.getElementById('buttons');

    const ICONS = {
      download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
      check: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
      warning: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
    };

    function makeBtn(label, cls, action) {
      const b = document.createElement('button');
      b.className = cls;
      b.textContent = label;
      b.onclick = () => {
        ipcRenderer.send('update-dialog-action', action);
        if (action !== 'install') window.close();
      };
      return b;
    }

    function closeDialog() {
      ipcRenderer.send('update-dialog-action', 'close');
      window.close();
    }

    if (type === 'available') {
      iconWrap.style.background = 'rgba(105,240,174,0.1)';
      iconWrap.style.border     = '1.5px solid rgba(105,240,174,0.25)';
      iconSvg.innerHTML = ICONS.download;
      iconSvg.style.color = '#69f0ae';

      if (version) {
        versionBadge.textContent = 'v' + version;
        versionBadge.style.display = 'inline-block';
      }

      heading.textContent = '¡Nueva versión disponible!';
      bodyEl.innerHTML    = 'Se está descargando en segundo plano.<br>Te avisaremos cuando esté lista para instalar.';
      progressWrap.style.display = 'block';
      buttons.appendChild(makeBtn('Entendido', 'primary', 'close'));

    } else if (type === 'downloaded') {
      iconWrap.classList.add('no-ring');
      iconWrap.style.background = 'rgba(105,240,174,0.15)';
      iconWrap.style.border     = '1.5px solid rgba(105,240,174,0.45)';
      iconSvg.innerHTML = ICONS.check;
      iconSvg.style.color = '#69f0ae';

      heading.textContent = '¡Actualización lista!';
      bodyEl.innerHTML    = 'La nueva versión fue descargada.<br>¿Deseas reiniciar <strong>CAS Express</strong> ahora?';

      buttons.appendChild(makeBtn('Reiniciar ahora', 'primary',    'install'));
      buttons.appendChild(makeBtn('Más tarde',       'secondary',  'close'));

    } else if (type === 'error') {
      iconWrap.classList.add('no-ring');
      iconWrap.style.background = 'rgba(239,83,80,0.1)';
      iconWrap.style.border     = '1.5px solid rgba(239,83,80,0.3)';
      iconSvg.innerHTML = ICONS.warning;
      iconSvg.style.color = '#ef5350';

      heading.textContent = 'Error de actualización';
      bodyEl.textContent  = message || 'No se pudo verificar actualizaciones.\nVerifica tu conexión a internet.';

      buttons.appendChild(makeBtn('Cerrar', 'secondary', 'close'));
    }
  </script>
</body>
</html>
