name: Build y Publicar CAS Majahual

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install

      - name: Aplicar parche expo-router
        run: node scripts/patch-expo-router.js

      - name: Crear archivo .env con credenciales Firebase
        shell: cmd
        run: |
          echo EXPO_ROUTER_APP_ROOT=app> .env
          echo EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}>> .env
          echo EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}>> .env
          echo EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}>> .env
          echo EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}>> .env
          echo EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}>> .env
          echo EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}>> .env

      - name: Instalar sharp-cli
        run: npm install -g sharp-cli@2.1.0

      - name: Instalar sharp local
        run: npm install sharp

      - name: Exportar Expo web
        run: npx expo export --platform web --output-dir dist

      - name: Compilar y publicar instalador .exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
